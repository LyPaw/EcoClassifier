name: Build Native Installer

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Java JDK 24
      uses: actions/setup-java@v4
      with:
        java-version: '24'
        distribution: 'liberica'
        cache: 'maven'

    - name: Compilar el proyecto con Maven
      run: mvn clean package -DskipTests

    - name: Copiar el JAR del proyecto y limpiar duplicados de módulos
      run: |
        Copy-Item target/eco-clasificador-1.0.jar target/dependency/
        Remove-Item target/dependency/javafx-*-24.jar -Exclude *-win.jar

    - name: Ejecutar jpackage (app-image)
      run: |
        jpackage `
          --type app-image `
          --input target/dependency/ `
          --main-jar "eco-clasificador-1.0.jar" `
          --main-class "org.ecoclasificador.Main" `
          --name "EcoClassifier" `
          --dest output/ `
          --java-options "--enable-native-access=ALL-UNNAMED"

    - name: Subir app-image como artifact
      uses: actions/upload-artifact@v4
      with:
        name: EcoClassifier-App
        path: output/EcoClassifier/

    - name: Generar instalador EXE
      run: |
        jpackage `
          --type exe `
          --app-image output/EcoClassifier/ `
          --dest output-installer/ `
          --win-dir-chooser `
          --win-shortcut

    - name: Subir instalador EXE como artifact
      uses: actions/upload-artifact@v4
      with:
        name: EcoClassifier-Installer
        path: output-installer/*.exe

    - name: Subir el instalador a la Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: output-installer/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
